name: Release Module

# Push a version tag (e.g. v0.5.0) and this builds + publishes a release that
# Foundry's "Check for Updates" can see. Workflow:
#   git tag v0.5.1 && git push origin v0.5.1
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version + manifest/download URLs into module.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          jq \
            --arg v   "$VERSION" \
            --arg man "https://github.com/$REPO/releases/latest/download/module.json" \
            --arg dl  "https://github.com/$REPO/releases/latest/download/module.zip" \
            --arg url "https://github.com/$REPO" \
            '.version = $v | .manifest = $man | .download = $dl | .url = $url' \
            module.json > module.tmp && mv module.tmp module.json
          echo "--- stamped module.json ---"; cat module.json

      - name: Build module.zip
        run: zip -r module.zip module.json scripts README.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
